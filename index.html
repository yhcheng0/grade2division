<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>小二超級市場包裝遊戲</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');

        :root {
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-left: env(safe-area-inset-left, 0px);
            --safe-right: env(safe-area-inset-right, 0px);
            --pad-x: clamp(12px, 3vw, 24px);
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-padding-top: 8px;
        }

        body {
            font-family: 'Noto Sans TC', Arial, sans-serif;
            background: linear-gradient(160deg, #e8f4fc 0%, #fdf2f7 45%, #fff5f8 100%);
            margin: 0;
            padding: 0 var(--pad-x) calc(20px + var(--safe-bottom));
            min-height: 100dvh;
            -webkit-tap-highlight-color: transparent;
        }

        .top-toolbar {
            position: sticky;
            top: 0;
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 8px;
            margin: 0 calc(-1 * var(--pad-x)) 16px;
            padding: calc(10px + var(--safe-top)) calc(14px + var(--safe-right)) 12px calc(14px + var(--safe-left));
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.97) 0%, rgba(255, 252, 254, 0.94) 100%);
            border-bottom: 1px solid rgba(255, 105, 180, 0.15);
            box-shadow: 0 4px 24px rgba(80, 40, 90, 0.07);
            backdrop-filter: blur(12px);
            border-radius: 0 0 18px 18px;
        }

        .toolbar-row-main {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 10px 14px;
        }

        .toolbar-brand {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 8px 14px;
            min-width: 0;
            flex: 1 1 auto;
        }

        .toolbar-title {
            margin: 0;
            font-size: clamp(0.9rem, 2.2vw + 0.48rem, 1.22rem);
            font-weight: 700;
            color: #e91e8c;
            line-height: 1.3;
            letter-spacing: 0.02em;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.8);
        }

        .toolbar-question-num {
            font-size: clamp(0.82rem, 1.3vw + 0.5rem, 1rem);
            color: #5c5c5c;
            white-space: nowrap;
            padding: 4px 10px;
            background: rgba(255, 182, 193, 0.2);
            border-radius: 999px;
        }

        .toolbar-row-stats {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            padding-top: 2px;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        .toolbar-progress {
            color: #444;
            font-size: clamp(0.85rem, 1.2vw + 0.55rem, 1.05rem);
            line-height: 1.4;
            flex: 1 1 auto;
            min-width: min(100%, 180px);
        }

        .toolbar-actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: flex-end;
            gap: 10px 12px;
            flex: 0 1 auto;
        }

        .score {
            color: #c71585;
            font-weight: 700;
            font-size: clamp(0.9rem, 1.3vw + 0.52rem, 1.05rem);
            padding: 8px 16px;
            background: linear-gradient(135deg, #fff0f8, #ffe8f3);
            border: 1px solid rgba(255, 105, 180, 0.25);
            border-radius: 999px;
            white-space: nowrap;
            box-shadow: 0 1px 3px rgba(199, 21, 133, 0.08);
        }

        .btn-end-toolbar {
            margin: 0;
            min-height: 44px;
            min-width: 44px;
            padding: 10px 18px;
            font-size: clamp(0.95rem, 1.2vw + 0.55rem, 1.05rem);
            box-shadow: 0 2px 8px rgba(255, 69, 0, 0.25);
        }

        .question {
            font-size: clamp(1.05rem, 1.8vw + 0.6rem, 1.65rem);
            background: #fff0f5;
            padding: clamp(12px, 2vw, 20px);
            border-radius: 15px;
            margin: 0 auto 12px;
            max-width: 800px;
            line-height: 1.5;
        }

        #game-screen {
            max-width: 1100px;
            margin: 0 auto;
        }

        .game-layout {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .game-col-main,
        .game-col-side {
            min-width: 0;
        }

        .objects-display {
            font-size: clamp(1.75rem, 4vw + 0.5rem, 3rem);
            padding: clamp(12px, 2vw, 20px);
            min-height: 140px;
            margin: 0 auto;
            max-width: 800px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-content: flex-start;
        }

        .group {
            background: #ffffe0;
            border: 4px solid #ffd700;
            border-radius: 18px;
            padding: 10px 15px;
            margin: 6px;
        }

        .remainder {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            width: 100%;
            font-size: inherit;
        }

        .choices {
            margin: 8px auto 0;
            padding: 0 4px;
            max-width: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 10px;
        }

        .choice-btn {
            font-size: clamp(1rem, 1.5vw + 0.5rem, 1.35rem);
            padding: 14px 16px;
            width: 100%;
            max-width: min(420px, 100%);
            margin: 0 auto;
            min-height: 48px;
            background: #fff0f5;
            border: 3px solid #ff69b4;
            border-radius: 15px;
            cursor: pointer;
        }

        .choice-btn.correct {
            background: #90ee90;
            border-color: #32cd32;
        }

        .choice-btn.wrong {
            background: #ffcccb;
            border-color: #ff6347;
        }

        .input-area {
            text-align: left;
            margin: 8px 0 0;
            max-width: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        /* 第2欄：被除數、商上下對齊；「=」在商的左側（第1欄第2列） */
        .input-equation {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto minmax(0, 1fr);
            grid-template-rows: auto auto;
            align-items: center;
            column-gap: 10px;
            row-gap: 10px;
            width: 100%;
            max-width: min(420px, 100%);
            line-height: 1.6;
        }

        .input-equation .eq-a {
            grid-column: 2;
            grid-row: 1;
            width: 100%;
            min-width: 0;
        }

        .input-equation .eq-div {
            grid-column: 3;
            grid-row: 1;
            font-size: clamp(1.2rem, 2.5vw + 0.5rem, 1.75rem);
            font-weight: 600;
            color: #333;
            justify-self: center;
        }

        .input-equation .eq-b {
            grid-column: 4;
            grid-row: 1;
            width: 100%;
            min-width: 0;
        }

        .input-equation .eq-eq {
            grid-column: 1;
            grid-row: 2;
            font-size: clamp(1.2rem, 2.5vw + 0.5rem, 1.75rem);
            font-weight: 600;
            color: #333;
            justify-self: end;
            align-self: center;
            padding-right: 2px;
        }

        .input-equation .eq-c {
            grid-column: 2;
            grid-row: 2;
            width: 100%;
            min-width: 0;
        }

        .input-equation .remainder-input-wrap {
            grid-column: 3 / 5;
            grid-row: 2;
            justify-self: start;
            align-self: center;
        }

        .input-area input {
            font-size: clamp(1.15rem, 2vw + 0.5rem, 1.65rem);
            width: min(100px, 22vw);
            max-width: 120px;
            text-align: center;
            margin: 4px 6px;
            padding: 10px 8px;
            min-height: 48px;
            border: 3px solid #ff69b4;
            border-radius: 10px;
        }

        .input-area .input-equation>input.eq-a,
        .input-area .input-equation>input.eq-b,
        .input-area .input-equation>input.eq-c {
            width: 100%;
            max-width: 100%;
            margin-left: 0;
            margin-right: 0;
        }

        .input-area input::placeholder {
            color: #666;
            opacity: 1;
            font-size: clamp(0.62rem, 1.35vw + 0.38rem, 0.82rem);
            line-height: 1.25;
        }

        .input-area input::-webkit-input-placeholder {
            color: #666;
            opacity: 1;
            font-size: clamp(0.62rem, 1.35vw + 0.38rem, 0.82rem);
            line-height: 1.25;
        }

        /* 中等模式提示較長：加寬欄位，避免中文被裁切 */
        .input-area.input-area--medium .input-equation>input.eq-a,
        .input-area.input-area--medium .input-equation>input.eq-b,
        .input-area.input-area--medium .input-equation>input.eq-c {
            min-width: 0;
        }

        .input-area.input-area--medium .input-equation {
            max-width: min(480px, 100%);
        }

        .input-area input#input-r {
            width: min(72px, 18vw);
            max-width: 90px;
        }

        .input-area.input-area--medium input#input-r {
            width: min(120px, 32vw);
            max-width: 140px;
        }

        .remainder-input-wrap {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .remainder-input-wrap .ellipsis-before {
            font-size: clamp(1.25rem, 2vw + 0.65rem, 1.75rem);
            color: #333;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .feedback {
            font-size: clamp(1rem, 1.5vw + 0.55rem, 1.45rem);
            min-height: 52px;
            margin: 10px auto;
            text-align: center;
            max-width: 800px;
        }

        button.action {
            font-size: clamp(1rem, 1.5vw + 0.5rem, 1.2rem);
            padding: 12px 28px;
            margin: 8px 4px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            min-height: 48px;
            touch-action: manipulation;
        }

        .game-actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }

        .btn-next {
            background: #1e90ff;
            color: white;
        }

        .btn-next:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .btn-end {
            background: #ff4500;
            color: white;
        }

        .btn-submit {
            background: #32cd32;
            color: white;
        }

        /* iPad landscape & wide tablets: two columns */
        @media (orientation: landscape) and (min-width: 700px) {
            .game-layout {
                display: grid;
                grid-template-columns: minmax(0, 1fr) minmax(280px, 1fr);
                gap: 16px 20px;
                align-items: start;
            }

            .objects-display {
                min-height: 120px;
                margin: 0;
            }

            .choices {
                margin-top: 0;
            }

            .feedback {
                min-height: 44px;
            }
        }

        @media (orientation: landscape) and (min-width: 700px) and (max-height: 520px) {
            .top-toolbar {
                gap: 6px;
                margin-bottom: 10px;
                padding-top: calc(6px + var(--safe-top));
            }

            .toolbar-title {
                font-size: 0.95rem;
            }

            .toolbar-question-num {
                font-size: 0.8rem;
            }

            .toolbar-progress {
                font-size: 0.8rem;
            }

            .objects-display {
                min-height: 88px;
                padding: 8px;
            }
        }

        #end-screen {
            padding: 16px var(--pad-x);
            max-width: 640px;
            margin-left: auto;
            margin-right: auto;
        }

        #end-screen h2 {
            font-size: clamp(1.25rem, 3vw, 1.75rem);
        }

        .history-section {
            text-align: left;
            margin: 24px auto;
            max-width: 560px;
            font-size: clamp(0.88rem, 1.4vw + 0.45rem, 1rem);
        }

        .history-section h3 {
            font-size: clamp(1rem, 1.8vw + 0.5rem, 1.2rem);
            margin: 0 0 12px 0;
            color: #444;
        }

        .history-list {
            max-height: min(50vh, 320px);
            overflow-y: auto;
            border: 1px solid rgba(255, 105, 180, 0.25);
            border-radius: 12px;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.6);
        }

        .history-item {
            padding: 8px 6px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
            line-height: 1.45;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-item.ok {
            color: #2e7d32;
        }

        .history-item.bad {
            color: #c62828;
        }

        .history-item .meta {
            font-size: 0.9em;
            color: #666;
            margin-top: 4px;
        }

        .end-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }

        .btn-redo-wrong {
            background: #ff9800 !important;
            color: #fff !important;
        }
    </style>
</head>

<body>
    <header class="top-toolbar" role="banner">
        <div class="toolbar-row-main">
            <div class="toolbar-brand">
                <h1 class="toolbar-title">🛒 小二超級市場包裝遊戲 🛒</h1>
                <span class="toolbar-question-num">第 <span id="question-num">1</span> 題</span>
            </div>
            <div class="toolbar-actions">
                <span class="score">分數: <span id="score">0</span></span>
                <button type="button" id="btn-end-game" class="action btn-end btn-end-toolbar"
                    onclick="endGame()">結束遊戲</button>
            </div>
        </div>
        <div class="toolbar-row-stats">
            <div class="toolbar-progress">
                正確: <span id="correct-count">0</span>　連續: <span id="streak">0</span><span
                    id="streak-suffix">/5</span>　模式: <span id="mode-name">簡單</span>
            </div>
        </div>
    </header>

    <div id="game-screen">
        <div class="game-layout">
            <div class="game-col game-col-main">
                <div class="question">
                    有 <strong id="total-show">12</strong> <span id="unit-show">個</span>
                    <span id="product-show">蘋果 🍎</span>，每 <strong id="per-show">3</strong> <span
                        id="unit-show2">個</span> 分成一份，可分成幾份？
                </div>
                <div id="objects-display" class="objects-display"></div>
            </div>

            <div class="game-col game-col-side">
                <div id="easy-choices" class="choices"></div>

                <div id="input-area" class="input-area" style="display:none;">
                    <div class="input-equation">
                        <input type="text" id="input-a" class="eq-a" inputmode="numeric" autocomplete="off"
                            aria-label="總數">
                        <span class="eq-div" aria-hidden="true">÷</span>
                        <input type="text" id="input-b" class="eq-b" inputmode="numeric" autocomplete="off"
                            aria-label="每份數">
                        <span class="eq-eq" aria-hidden="true">=</span>
                        <input type="text" id="input-c" class="eq-c" inputmode="numeric" autocomplete="off"
                            aria-label="商（份數）">
                        <span id="remainder-input-wrap" class="remainder-input-wrap" style="display:none;" hidden>
                            <span class="ellipsis-before" aria-hidden="true">…</span>
                            <input type="text" id="input-r" inputmode="numeric" autocomplete="off" aria-label="餘數">
                        </span>
                    </div>
                    <br><br>
                    <button type="button" id="submit-btn" class="action btn-submit" onclick="checkInput()">提交答案</button>
                </div>

                <div id="feedback" class="feedback"></div>

                <div class="game-actions">
                    <button type="button" class="btn-next action" onclick="nextQuestion()" id="next-btn">下一題</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 結束畫面 -->
    <div id="end-screen" style="display:none; text-align:center; margin-top:40px;">
        <h2>🎉 遊戲結束！</h2>
        <div style="font-size:48px; margin:30px 0;">
            總分 <strong id="final-score" style="color:#ff1493;"></strong>
        </div>
        <p style="font-size:28px;">
            正確題數：<strong id="final-correct"></strong> / <strong id="final-total"></strong><br>
            正確率：<strong id="final-percent"></strong>
        </p>
        <p id="final-grade" style="font-size:26px; margin:20px 0;"></p>
        <div class="history-section">
            <h3>📋 作答紀錄</h3>
            <div id="history-list" class="history-list"></div>
        </div>
        <div class="end-actions">
            <button type="button" id="btn-redo-wrong" class="action btn-redo-wrong"
                style="display:none; font-size:clamp(1rem,2.5vw,1.25rem); padding:14px clamp(20px,6vw,40px); min-height:48px;"
                onclick="redoWrongQuestions()">重做錯題</button>
            <button type="button" class="action" onclick="restartGame()"
                style="background:#32cd32; font-size:clamp(1rem,2.5vw,1.25rem); padding:14px clamp(24px,8vw,50px); min-height:48px;">再玩一次</button>
        </div>
    </div>

    <script>
        let currentMode = 'easy';
        let totalScore = 0;
        let questionCount = 0;
        let correctCount = 0;
        let streak = 0;
        let currentTotal = 0;
        let currentPer = 0;
        let currentRemainder = 0;
        let currentProduct = {};
        let correctQuotient = 0;
        let pointsPerQuestion = 10;
        let hasAnswered = false;
        let questionHistory = [];
        let sessionSnapshot = null;
        let redoMode = false;
        let redoQueue = [];
        let redoIndex = 0;

        const supermarketProducts = [
            { name: "蘋果汁", emoji: "🧃", unit: "包" },
            { name: "香蕉", emoji: "🍌", unit: "條" },
            { name: "番茄罐頭", emoji: "🥫", unit: "罐" },
            { name: "糖果", emoji: "🍬", unit: "粒" },
            { name: "餅乾", emoji: "🍪", unit: "塊" },
            { name: "牙刷", emoji: "🪥", unit: "支" },
            { name: "蛋糕", emoji: "🍰", unit: "件" },
            { name: "雞蛋", emoji: "🥚", unit: "隻" },
            { name: "薯仔", emoji: "🥔", unit: "個" },
            { name: "調味料", emoji: "🧂", unit: "瓶" }
        ];

        function pointsForMode(mode) {
            if (mode === 'easy') return 10;
            if (mode === 'medium') return 20;
            return 30;
        }

        function syncActionButtons() {
            const nextBtn = document.getElementById('next-btn');
            const submitBtn = document.getElementById('submit-btn');
            const isInputMode = currentMode !== 'easy';
            if (!hasAnswered) {
                nextBtn.style.display = 'none';
                if (submitBtn) {
                    submitBtn.style.display = isInputMode ? 'inline-block' : 'none';
                }
            } else {
                nextBtn.style.display = 'inline-block';
                nextBtn.disabled = false;
                if (submitBtn) {
                    submitBtn.style.display = 'none';
                }
            }
        }

        function applySnapshot(snap) {
            currentTotal = snap.total;
            currentPer = snap.per;
            currentRemainder = snap.remainder;
            correctQuotient = snap.quotient;
            currentProduct = {
                name: snap.product.name,
                emoji: snap.product.emoji,
                unit: snap.product.unit
            };
            currentMode = snap.modeAtAnswer;
            pointsPerQuestion = pointsForMode(snap.modeAtAnswer);
            document.getElementById('mode-name').textContent =
                currentMode === 'easy' ? '簡單' : currentMode === 'medium' ? '中等' : '困難';
            setStreakDisplay();
        }

        function setStreakDisplay() {
            document.getElementById('streak').textContent = streak;
            const suf = document.getElementById('streak-suffix');
            if (suf) {
                suf.style.display = currentMode === 'hard' ? 'none' : 'inline';
            }
        }

        function setEndGameButtonVisible(show) {
            const btn = document.getElementById('btn-end-game');
            if (btn) btn.style.display = show ? 'inline-block' : 'none';
        }

        function recordAnswer(isCorrect) {
            const answerText = currentRemainder > 0
                ? `${currentTotal} ÷ ${currentPer} = ${correctQuotient} … ${currentRemainder}`
                : `${currentTotal} ÷ ${currentPer} = ${correctQuotient}`;
            const label = redoMode
                ? `重做 ${redoIndex + 1} / ${redoQueue.length}`
                : `第 ${questionCount} 題`;
            questionHistory.push({
                label,
                total: currentTotal,
                per: currentPer,
                quotient: correctQuotient,
                remainder: currentRemainder,
                product: {
                    name: currentProduct.name,
                    emoji: currentProduct.emoji,
                    unit: currentProduct.unit
                },
                correct: isCorrect,
                modeAtAnswer: currentMode,
                isRedo: redoMode,
                answerText
            });
            if (redoMode && isCorrect) {
                redoIndex++;
            }
        }

        function getUniqueWrongQuestions() {
            const seen = new Set();
            const out = [];
            for (const h of questionHistory) {
                if (!h.correct) {
                    const key = `${h.total}-${h.per}-${h.product.name}`;
                    if (!seen.has(key)) {
                        seen.add(key);
                        out.push(h);
                    }
                }
            }
            return out;
        }

        function renderHistoryList() {
            const el = document.getElementById('history-list');
            if (!el) return;
            if (questionHistory.length === 0) {
                el.innerHTML = '<div class="history-item">尚無紀錄</div>';
                return;
            }
            el.innerHTML = questionHistory.map(h => {
                const cls = h.correct ? 'ok' : 'bad';
                const icon = h.correct ? '✅' : '❌';
                const shortQ = `有 ${h.total} ${h.product.unit} ${h.product.name}${h.product.emoji}，每 ${h.per} ${h.product.unit} 分成一份`;
                return `<div class="history-item ${cls}"><strong>${icon} ${escapeHtml(h.label)}</strong><div class="meta">${escapeHtml(shortQ)}</div><div class="meta">正解：${escapeHtml(h.answerText)}</div></div>`;
            }).join('');
        }

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function finishRedoSession() {
            redoMode = false;
            redoQueue = [];
            redoIndex = 0;
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('end-screen').style.display = 'block';
            endGame();
        }

        function redoWrongQuestions() {
            const wrongs = getUniqueWrongQuestions();
            if (wrongs.length === 0) return;
            redoQueue = wrongs.map(h => ({
                total: h.total,
                per: h.per,
                remainder: h.remainder,
                quotient: h.quotient,
                product: {
                    name: h.product.name,
                    emoji: h.product.emoji,
                    unit: h.product.unit
                },
                modeAtAnswer: h.modeAtAnswer
            }));
            redoMode = true;
            redoIndex = 0;
            document.getElementById('end-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            setEndGameButtonVisible(true);
            startNewQuestion();
        }

        function startNewQuestion() {
            hasAnswered = false;

            if (redoMode) {
                if (redoIndex >= redoQueue.length) {
                    finishRedoSession();
                    return;
                }
                applySnapshot(redoQueue[redoIndex]);
                document.getElementById('question-num').textContent = `重做 ${redoIndex + 1} / ${redoQueue.length}`;
                document.getElementById('score').textContent = totalScore;
                document.getElementById('correct-count').textContent = correctCount;
                setStreakDisplay();
                document.getElementById('feedback').innerHTML = '';
                document.getElementById('easy-choices').innerHTML = '';
                document.getElementById('input-area').style.display = 'none';
                document.getElementById('input-area').classList.remove('input-area--medium');

                document.getElementById('total-show').textContent = currentTotal;
                document.getElementById('product-show').innerHTML = `${currentProduct.name} ${currentProduct.emoji}`;
                document.getElementById('per-show').textContent = currentPer;
                document.getElementById('unit-show').textContent = currentProduct.unit;
                document.getElementById('unit-show2').textContent = currentProduct.unit;

                showGroupedObjects();

                if (currentMode === 'easy') {
                    showMultipleChoices();
                } else {
                    const inputArea = document.getElementById('input-area');
                    inputArea.style.display = 'block';
                    inputArea.classList.toggle('input-area--medium', currentMode === 'medium');
                    const inputA = document.getElementById('input-a');
                    const inputB = document.getElementById('input-b');
                    const inputC = document.getElementById('input-c');
                    inputA.value = '';
                    inputB.value = '';
                    inputC.value = '';
                    const remWrap = document.getElementById('remainder-input-wrap');
                    const inputR = document.getElementById('input-r');
                    inputR.value = '';
                    const hints = currentMode === 'medium'
                        ? ['物件的數量', '每份的數量', '分成的份數', '餘下的數量']
                        : ['', '', '', ''];
                    [inputA, inputB, inputC, inputR].forEach((el, i) => {
                        const t = hints[i];
                        if (t) {
                            el.setAttribute('placeholder', t);
                            el.placeholder = t;
                        } else {
                            el.removeAttribute('placeholder');
                            el.placeholder = '';
                        }
                    });
                    if (currentRemainder > 0 && (currentMode === 'medium' || currentMode === 'hard')) {
                        remWrap.style.display = 'inline-flex';
                        remWrap.removeAttribute('hidden');
                    } else {
                        remWrap.style.display = 'none';
                        remWrap.setAttribute('hidden', '');
                    }
                }
                syncActionButtons();
                return;
            }

            questionCount++;
            document.getElementById('question-num').textContent = questionCount;
            document.getElementById('score').textContent = totalScore;
            document.getElementById('correct-count').textContent = correctCount;
            setStreakDisplay();
            document.getElementById('feedback').innerHTML = '';
            document.getElementById('easy-choices').innerHTML = '';
            document.getElementById('input-area').style.display = 'none';
            document.getElementById('input-area').classList.remove('input-area--medium');

            currentProduct = supermarketProducts[Math.floor(Math.random() * supermarketProducts.length)];
            const totals = [9, 12, 13, 15, 16, 17, 18, 20, 21, 22, 24, 25, 28, 30];
            currentTotal = totals[Math.floor(Math.random() * totals.length)];
            currentPer = Math.floor(Math.random() * 5) + 2;
            correctQuotient = Math.floor(currentTotal / currentPer);
            currentRemainder = currentTotal % currentPer;

            // 更新問題文字
            document.getElementById('total-show').textContent = currentTotal;
            document.getElementById('product-show').innerHTML = `${currentProduct.name} ${currentProduct.emoji}`;
            document.getElementById('per-show').textContent = currentPer;
            document.getElementById('unit-show').textContent = currentProduct.unit;
            document.getElementById('unit-show2').textContent = currentProduct.unit;

            showGroupedObjects();

            if (currentMode === 'easy') {
                showMultipleChoices();
            } else {
                const inputArea = document.getElementById('input-area');
                inputArea.style.display = 'block';
                inputArea.classList.toggle('input-area--medium', currentMode === 'medium');
                const inputA = document.getElementById('input-a');
                const inputB = document.getElementById('input-b');
                const inputC = document.getElementById('input-c');
                inputA.value = '';
                inputB.value = '';
                inputC.value = '';
                const remWrap = document.getElementById('remainder-input-wrap');
                const inputR = document.getElementById('input-r');
                inputR.value = '';
                const hints = currentMode === 'medium'
                    ? ['物件的數量', '每份的數量', '分成的份數', '餘下的數量']
                    : ['', '', '', ''];
                [inputA, inputB, inputC, inputR].forEach((el, i) => {
                    const t = hints[i];
                    if (t) {
                        el.setAttribute('placeholder', t);
                        el.placeholder = t;
                    } else {
                        el.removeAttribute('placeholder');
                        el.placeholder = '';
                    }
                });
                if (currentRemainder > 0 && (currentMode === 'medium' || currentMode === 'hard')) {
                    remWrap.style.display = 'inline-flex';
                    remWrap.removeAttribute('hidden');
                } else {
                    remWrap.style.display = 'none';
                    remWrap.setAttribute('hidden', '');
                }
            }
            syncActionButtons();
        }

        function showGroupedObjects() {
            const display = document.getElementById('objects-display');
            let html = '';
            const groups = Math.floor(currentTotal / currentPer);

            // 顯示完整的組
            for (let i = 0; i < groups; i++) {
                html += `<div class="group">`;
                for (let j = 0; j < currentPer; j++) {
                    html += currentProduct.emoji;
                }
                html += `</div>`;
            }

            // 顯示剩餘的物品（僅排列圖示）
            if (currentRemainder > 0) {
                html += `<div class="remainder">`;
                for (let k = 0; k < currentRemainder; k++) {
                    html += currentProduct.emoji;
                }
                html += `</div>`;
            }

            display.innerHTML = html;
        }

        function showMultipleChoices() {
            const choicesDiv = document.getElementById('easy-choices');
            const a = currentTotal, b = currentPer, c = correctQuotient, r = currentRemainder;

            const correctStr = r > 0
                ? `${a} ÷ ${b} = ${c} … ${r}`
                : `${a} ÷ ${b} = ${c}`;

            const wrongCandidates = [
                `${b} ÷ ${a} = ${c}`,
                `${a} ÷ ${c} = ${b}`,
                `${a} ÷ ${b} = ${c + 1}`,
                `${a} ÷ ${b} = ${c + 2}`,
                c > 1 ? `${a} ÷ ${b} = ${c - 1}` : null,
                `${b} ÷ ${a} = ${c + 1}`,
                `${a + 1} ÷ ${b} = ${c}`,
                `${a} ÷ ${b + 1} = ${c}`
            ].filter(Boolean);

            const remainderWrongs = [];
            if (r > 0) {
                for (let k = 1; k < b; k++) {
                    if (k !== r) {
                        remainderWrongs.push(`${a} ÷ ${b} = ${c} … ${k}`);
                    }
                }
                if (remainderWrongs.length === 0 && c > 1) {
                    const s = `${a} ÷ ${b} = ${c - 1} … 1`;
                    if (s !== correctStr) remainderWrongs.push(s);
                }
                if (remainderWrongs.length === 0) {
                    const s = `${a} ÷ ${b} = ${c + 1} … 1`;
                    if (s !== correctStr) remainderWrongs.push(s);
                }
            }
            wrongCandidates.push(...remainderWrongs);

            const seen = new Set([correctStr]);
            const wrongUnique = [];
            for (const s of wrongCandidates) {
                if (!seen.has(s)) {
                    seen.add(s);
                    wrongUnique.push(s);
                }
            }
            let pad = 1;
            while (wrongUnique.length < 2 && pad < 30) {
                const s = `${a} ÷ ${b} = ${c + 2 + pad}`;
                if (!seen.has(s)) {
                    seen.add(s);
                    wrongUnique.push(s);
                }
                pad++;
            }

            let pickedWrong = [];
            if (r > 0 && remainderWrongs.length >= 2) {
                const sh = [...remainderWrongs].sort(() => Math.random() - 0.5);
                pickedWrong = sh.slice(0, 2);
            } else if (r > 0 && remainderWrongs.length === 1) {
                pickedWrong.push(remainderWrongs[0]);
                const nonRem = wrongUnique.find(s => !s.includes('…'));
                if (nonRem) {
                    pickedWrong.push(nonRem);
                } else {
                    let p = 1;
                    while (pickedWrong.length < 2 && p < 30) {
                        const s = `${a} ÷ ${b} = ${c + 2 + p}`;
                        if (!pickedWrong.includes(s) && s !== correctStr) {
                            pickedWrong.push(s);
                            break;
                        }
                        p++;
                    }
                }
            } else {
                wrongUnique.sort(() => Math.random() - 0.5);
                pickedWrong = wrongUnique.slice(0, 2);
            }

            while (pickedWrong.length < 2) {
                const fallback = wrongUnique.find(s => !pickedWrong.includes(s));
                if (fallback) pickedWrong.push(fallback);
                else break;
            }

            let opts = [correctStr, ...pickedWrong].sort(() => Math.random() - 0.5);

            opts.forEach(text => {
                const isCorrect = text === correctStr;
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = text;
                btn.onclick = () => handleAnswer(isCorrect, btn, text);
                choicesDiv.appendChild(btn);
            });
        }

        function handleAnswer(isCorrect, btnElement, text) {
            if (hasAnswered) return;
            hasAnswered = true;

            document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);

            if (isCorrect) {
                btnElement.classList.add('correct');
                document.getElementById('feedback').innerHTML = `✅ 正確！<br><strong>${text}</strong>`;
                document.getElementById('feedback').style.color = '#32cd32';
                if (!redoMode) {
                    totalScore += pointsPerQuestion;
                    correctCount++;
                }
                if (!redoMode) streak++;
            } else {
                btnElement.classList.add('wrong');
                const correctText = currentRemainder > 0
                    ? `${currentTotal} ÷ ${currentPer} = ${correctQuotient} … ${currentRemainder}`
                    : `${currentTotal} ÷ ${currentPer} = ${correctQuotient}`;
                document.getElementById('feedback').innerHTML = `❌ 正確答案是 <strong>${correctText}</strong>`;
                document.getElementById('feedback').style.color = '#ff6347';
                if (!redoMode) streak = 0;
            }
            recordAnswer(isCorrect);
            syncActionButtons();
            updateUI();
        }

        function checkInput() {
            if (hasAnswered) return;
            hasAnswered = true;

            const a = parseInt(document.getElementById('input-a').value) || 0;
            const b = parseInt(document.getElementById('input-b').value) || 0;
            const c = parseInt(document.getElementById('input-c').value) || 0;
            const r = parseInt(document.getElementById('input-r').value) || 0;
            const remWrap = document.getElementById('remainder-input-wrap');
            const remainderRequired = currentRemainder > 0 && (currentMode === 'medium' || currentMode === 'hard')
                && remWrap.style.display !== 'none' && !remWrap.hasAttribute('hidden');

            let isAllCorrect = (a === currentTotal && b === currentPer && c === correctQuotient);
            if (remainderRequired) {
                isAllCorrect = isAllCorrect && (r === currentRemainder);
            }

            if (isAllCorrect) {
                const correctText = currentRemainder > 0
                    ? `${currentTotal} ÷ ${currentPer} = ${correctQuotient} … ${currentRemainder}`
                    : `${currentTotal} ÷ ${currentPer} = ${correctQuotient}`;

                document.getElementById('feedback').innerHTML = `✅ 太棒了！正確！<br><strong>${correctText}</strong>`;
                document.getElementById('feedback').style.color = '#32cd32';
                if (!redoMode) {
                    totalScore += pointsPerQuestion;
                    correctCount++;
                }
                if (!redoMode) streak++;
            } else {
                const correctText = currentRemainder > 0
                    ? `${currentTotal} ÷ ${currentPer} = ${correctQuotient} … ${currentRemainder}`
                    : `${currentTotal} ÷ ${currentPer} = ${correctQuotient}`;

                document.getElementById('feedback').innerHTML = `❌ 答案不完全正確<br>正確答案是 <strong>${correctText}</strong>`;
                document.getElementById('feedback').style.color = '#ff6347';
                if (!redoMode) streak = 0;
            }
            recordAnswer(isAllCorrect);
            syncActionButtons();
            updateUI();
        }

        function updateUI() {
            document.getElementById('score').textContent = totalScore;
            document.getElementById('correct-count').textContent = correctCount;
            setStreakDisplay();
        }

        function checkStreakUpgrade() {
            if (streak >= 5) {
                if (currentMode === 'easy') {
                    currentMode = 'medium';
                    pointsPerQuestion = 20;
                    streak = 0;
                } else if (currentMode === 'medium') {
                    currentMode = 'hard';
                    pointsPerQuestion = 30;
                    streak = 0;
                }
                // 困難模式：已達最高等級，連續答對數不歸零，繼續累加
                document.getElementById('mode-name').textContent =
                    currentMode === 'easy' ? '簡單' : currentMode === 'medium' ? '中等' : '困難';
                setStreakDisplay();
            }
        }

        function nextQuestion() {
            if (redoMode) {
                startNewQuestion();
                return;
            }
            checkStreakUpgrade();
            startNewQuestion();
        }

        function endGame() {
            if (!redoMode && sessionSnapshot === null) {
                sessionSnapshot = {
                    total: questionCount,
                    correct: correctCount,
                    score: totalScore
                };
            }

            const totalQuestions = sessionSnapshot ? sessionSnapshot.total : questionCount;
            const correctForRate = sessionSnapshot ? sessionSnapshot.correct : correctCount;
            const percent = totalQuestions > 0 ? Math.round((correctForRate / totalQuestions) * 100) : 0;

            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('end-screen').style.display = 'block';

            document.getElementById('final-score').textContent = totalScore;
            document.getElementById('final-correct').textContent = correctForRate;
            document.getElementById('final-total').textContent = totalQuestions;
            document.getElementById('final-percent').textContent = percent + '%';

            let grade = '';
            if (percent >= 85) grade = '🌟 非常優秀！你已經是超級市場包裝小高手了！';
            else if (percent >= 70) grade = '👍 很棒！繼續保持～';
            else if (percent >= 50) grade = '🙂 表現不錯，多練習會更好';
            else grade = '💪 再加油！多練習幾次一定會進步很多！';

            document.getElementById('final-grade').innerHTML = grade;

            renderHistoryList();
            const btnRedo = document.getElementById('btn-redo-wrong');
            if (btnRedo) {
                btnRedo.style.display = getUniqueWrongQuestions().length > 0 ? 'inline-block' : 'none';
            }
            setEndGameButtonVisible(false);
        }

        function restartGame() {
            totalScore = 0;
            questionCount = 0;
            correctCount = 0;
            streak = 0;
            currentMode = 'easy';
            pointsPerQuestion = 10;
            hasAnswered = false;
            questionHistory = [];
            sessionSnapshot = null;
            redoMode = false;
            redoQueue = [];
            redoIndex = 0;

            document.getElementById('end-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('mode-name').textContent = '簡單';
            setEndGameButtonVisible(true);
            startNewQuestion();
        }

        // 開始遊戲
        window.onload = function () {
            startNewQuestion();
        };
    </script>
