<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍎 分物練習</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
     
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
     
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(180deg, #fffbeb 0%, #fef3c7 100%);
            color: #3f2a1e;
            padding: 15px;
            min-height: 100vh;
        }
     
        .header { text-align: center; margin-bottom: 15px; }
        h1 { font-size: clamp(1.8rem, 5vw, 2.5rem); color: #c2410f; }
     
        .setup-panel, .result-panel {
            max-width: 950px; margin: 20px auto; background: white; border-radius: 25px;
            padding: 35px; box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }
     
        .section-title { text-align: center; font-size: 1.5rem; color: #854d0e; margin: 25px 0 15px; }
     
        .choice-grid { display: flex; justify-content: center; gap: 18px; flex-wrap: wrap; margin-bottom: 25px; }
     
        .choice-btn {
            background: white; border: 6px solid #ff9f1c; color: #c2410f;
            font-size: clamp(1.2rem, 4vw, 1.5rem); font-weight: 700;
            padding: 18px 30px; border-radius: 25px; cursor: pointer;
            min-width: 240px; transition: all 0.3s;
        }
        .choice-btn:hover, .choice-btn.active { transform: scale(1.05); background: #ff9f1c; color: white; }
     
        .food-select { text-align: center; margin: 25px 0; }
        .food-option {
            font-size: clamp(2.6rem, 8vw, 3.8rem); margin: 10px; cursor: pointer;
            padding: 12px; border-radius: 25px; transition: all 0.3s;
        }
        .food-option.selected { background: #fefce8; transform: scale(1.2); box-shadow: 0 10px 25px rgba(255,159,28,0.5); }
     
        .start-btn {
            display: block; margin: 30px auto; background: #10b981; color: white;
            border: none; padding: 16px 55px; font-size: 1.65rem; font-weight: 700;
            border-radius: 9999px; cursor: pointer; box-shadow: 0 7px 0 #166534;
        }
     
        .game-header {
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 10px; margin-bottom: 15px;
            background: white; padding: 12px 20px; border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
     
        .progress { font-size: clamp(1.2rem, 4vw, 1.45rem); font-weight: 700; color: #854d0e; }
        .timer {
            font-size: clamp(1.7rem, 5.5vw, 2.2rem); font-weight: 700;
            color: #b91c1c; background: #fee2e2; padding: 8px 25px; border-radius: 9999px;
        }
     
        .math-box {
            background: #fffbeb; border: 5px solid #f59e0b; border-radius: 20px;
            padding: 18px; text-align: center; font-size: clamp(1.35rem, 4.2vw, 1.7rem);
            line-height: 1.5; flex: 1;
        }
     
        .main-game {
            display: flex; gap: 20px; flex-wrap: wrap;
        }
     
        .plates-container {
            flex: 1; min-width: 300px;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px;
        }
     
        .plate {
            background: white; border-radius: 18px; padding: 14px 18px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            display: flex; align-items: center; gap: 14px;
        }
     
        .dropzone {
            flex: 1; min-height: 110px; background: #fefce8;
            border: 4px dashed #f59e0b; border-radius: 14px;
            padding: 12px; display: flex; flex-wrap: wrap; gap: 12px;
            justify-content: center;
        }
        .dropzone.dragover { background: #ecfccb; border-color: #65a30d; }
     
        .count { font-size: 1.75rem; font-weight: 700; color: #15803d; background: #ecfccb; padding: 6px 18px; border-radius: 9999px; }
     
        .pile-panel {
            width: 380px; background: white; border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.12); padding: 15px;
            position: sticky; top: 20px; align-self: flex-start;
            max-height: 85vh; overflow-y: auto;
        }
     
        .pile {
            min-height: 180px; background: #fefce8; border: 5px dashed #f59e0b;
            border-radius: 18px; padding: 15px; display: flex;
            flex-wrap: wrap; gap: 14px; justify-content: center;
        }
     
        .siumai-item {
            font-size: clamp(2.6rem, 7vw, 50px); cursor: grab; user-select: none;
        }
     
        .division-area {
            background: #fefce8; border: 5px solid #f59e0b; border-radius: 20px;
            padding: 25px; margin: 20px auto; max-width: 820px; text-align: center;
        }
     
        .division-row {
            display: flex; align-items: center; justify-content: center;
            flex-wrap: wrap; gap: 18px; margin: 15px 0;
            font-size: clamp(1.9rem, 5.8vw, 2.45rem);
        }
     
        .input-container { position: relative; display: inline-block; }
     
        .input-slot {
            width: 95px; height: 80px; font-size: 2.55rem; text-align: center;
            line-height: 74px; border: 4px solid #f59e0b; border-radius: 16px;
            background: white; outline: none;
        }
        .input-slot:focus { border-color: #65a30d; box-shadow: 0 0 12px rgba(101, 163, 13, 0.6); }
     
        .info-icon {
            position: absolute; top: -10px; right: -10px; width: 30px; height: 30px;
            background: #fffbeb; color: #854d0e; border-radius: 50%; font-size: 1.15rem;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15); cursor: help;
        }
     
        .operator { font-size: 2.8rem; font-weight: bold; color: #c2410f; padding: 0 8px; }
     
        .controls {
            text-align: center; margin: 25px 0;
            display: flex; flex-wrap: wrap; gap: 15px; justify-content: center;
        }
     
        button {
            background: #ff9f1c; color: white; border: none;
            padding: 14px 34px; font-size: clamp(1.25rem, 4.5vw, 1.55rem);
            font-weight: 700; border-radius: 9999px; cursor: pointer;
            box-shadow: 0 6px 0 #c2410f;
        }
        button:active { transform: translateY(3px); box-shadow: 0 3px 0 #c2410f; }
        button:disabled { background: #94a3b8; box-shadow: none; cursor: not-allowed; }
     
        .feedback {
            font-size: clamp(1.4rem, 5vw, 1.85rem);
            padding: 22px 30px; border-radius: 9999px; margin: 20px auto;
            text-align: center; font-weight: 700; display: none;
        }

        /* Result Panel */
        .result-panel {
            text-align: center;
        }
        .score-circle {
            width: 180px; height: 180px; margin: 20px auto;
            border-radius: 50%; border: 12px solid #f59e0b;
            display: flex; align-items: center; justify-content: center;
            font-size: 3.5rem; font-weight: 700; color: #c2410f;
        }
        .grade-title {
            font-size: 2.2rem; margin: 15px 0; color: #854d0e;
        }
        .result-list {
            text-align: left; max-width: 600px; margin: 30px auto;
            background: #fffbeb; padding: 20px; border-radius: 20px;
        }
        .result-item {
            padding: 12px 0; border-bottom: 1px solid #fcd34d;
            display: flex; justify-content: space-between;
        }
        .result-item:last-child { border-bottom: none; }
        .correct { color: #15803d; }
        .wrong { color: #b91c1c; }

        .tooltip {
            position: relative; display: inline-block; margin-left: 8px;
        }
        .tooltip .tooltiptext {
            visibility: hidden; width: 280px; background: #3f2a1e; color: white;
            text-align: left; border-radius: 12px; padding: 12px;
            position: absolute; z-index: 1; bottom: 125%; left: 50%;
            margin-left: -140px; opacity: 0; transition: opacity 0.3s;
            font-size: 1rem; line-height: 1.5;
        }
        .tooltip:hover .tooltiptext {
            visibility: visible; opacity: 1;
        }

        .footer { text-align: center; margin-top: 40px; color: #854d0e; font-size: 1.1rem; }
    </style>
</head>
<body>
    <!-- Setup Panel -->
    <div id="setupPanel" class="setup-panel">
        <div class="header"><h1>🍎 分物練習 🍎</h1></div>
       
        <div class="section-title">1. 餘數模式</div>
        <div class="choice-grid" id="remainderChoices">
            <button class="choice-btn active" data-remainder="0" onclick="selectRemainder(0)">沒有餘數</button>
            <button class="choice-btn" data-remainder="1" onclick="selectRemainder(1)">有餘數</button>
        </div>
        <div class="section-title">2. 除式模式</div>
        <div class="choice-grid" id="formulaChoices">
            <button class="choice-btn active" data-formula="0" onclick="selectFormula(0)">沒有除式</button>
            <button class="choice-btn" data-formula="1" onclick="selectFormula(1)">有除式</button>
        </div>
        <div class="section-title">3. 難度模式</div>
        <div class="choice-grid" id="difficultyChoices">
            <button class="choice-btn" data-diff="0" onclick="selectDifficulty(0)">簡單 Easy</button>
            <button class="choice-btn active" data-diff="1" onclick="selectDifficulty(1)">中等 Medium</button>
            <button class="choice-btn" data-diff="2" onclick="selectDifficulty(2)">困難 Hard</button>
        </div>
     
        <div class="food-select">
            <p style="margin-bottom:15px;color:#854d0e;font-size:1.3rem;">4. 選擇要分的食物</p>
            <span class="food-option" data-food="🍎" onclick="selectFood(this)">🍎</span>
            <span class="food-option" data-food="🍌" onclick="selectFood(this)">🍌</span>
            <span class="food-option" data-food="🍓" onclick="selectFood(this)">🍓</span>
            <span class="food-option" data-food="🥟" onclick="selectFood(this)">🥟</span>
            <span class="food-option" data-food="🍪" onclick="selectFood(this)">🍪</span>
        </div>
     
        <button id="startGameBtn" class="start-btn" onclick="startGame()" disabled>開始遊戲</button>
    </div>
 
    <!-- Game Area -->
    <div id="gameArea" style="display:none;">
        <!-- ... 遊戲區域保持不變 ... -->
        <div class="game-header">
            <div class="progress">第 <span id="currentQ">1</span> / 5 題</div>
            <div class="timer" id="timer">60 秒</div>
            <div class="math-box" id="questionBox"></div>
        </div>
     
        <div class="main-game">
            <div class="plates-container" id="platesContainer"></div>
            <div class="pile-panel">
                <div class="pile-header">
                    <div class="area-title" id="pileTitle">食物堆</div>
                </div>
                <div id="pile" class="pile" ondrop="dropFood(event)" ondragover="allowDrop(event)"></div>
            </div>
        </div>
     
        <div id="divisionArea" class="division-area" style="display:none;">
            <!-- division inputs ... (保持原樣) -->
            <div class="division-row">
                <div class="input-container">
                    <input id="totalInput" type="number" min="0" class="input-slot" placeholder="?">
                    <span class="info-icon" data-tooltip="被除數：物件的總數量">ℹ️</span>
                </div>
                <span class="operator">÷</span>
                <div class="input-container">
                    <input id="peopleInput" type="number" min="0" class="input-slot" placeholder="?">
                    <span class="info-icon" data-tooltip="除數：平均分成的份數">ℹ️</span>
                </div>
                <span class="operator">=</span>
                <div class="input-container">
                    <input id="quotientInput" type="number" min="0" class="input-slot" placeholder="?">
                    <span class="info-icon" data-tooltip="商：每份數量">ℹ️</span>
                </div>
                <div id="remainderPart" style="display:none; align-items:center; gap:12px;">
                    <span class="operator">......</span>
                    <div class="input-container">
                        <input id="remainderInput" type="number" min="0" class="input-slot" placeholder="?">
                        <span class="info-icon" data-tooltip="餘數">ℹ️</span>
                    </div>
                </div>
            </div>
        </div>
     
        <div class="controls">
            <button id="submitBtn" onclick="submitAnswer()">✅ 提交答案</button>
            <button id="hintBtn" onclick="showAnswer()" style="background:#64748b; display:none;">📋 展示答案</button>
            <button id="resetBtn" onclick="resetDistribution()" style="background:#64748b;">🔄 重置分配</button>
        </div>
     
        <div id="feedback" class="feedback"></div>
     
        <div style="text-align:center;margin:20px 0;">
            <button onclick="nextQuestion()" id="nextBtn" style="display:none;background:#10b981;padding:16px 50px;font-size:1.5rem;">
                下一題 →
            </button>
        </div>
    </div>

    <!-- Result Panel -->
    <div id="resultPanel" class="result-panel" style="display:none;">
        <h1 style="color:#c2410f;">🎉 練習完成！</h1>
        <div class="score-circle" id="scoreCircle">100</div>
        <div class="grade-title" id="gradeTitle">分物大師</div>
        
        <div style="margin:20px 0;">
            <strong>總用時：</strong> <span id="totalTime">0</span> 秒
        </div>

        <div class="result-list">
            <h3 style="margin-bottom:15px;">每題表現</h3>
            <div id="resultList"></div>
        </div>

        <button onclick="restartGame()" class="start-btn" style="background:#10b981; margin-top:20px;">
            再玩一次
        </button>
    </div>
 
    <div class="footer">❤️ 2A班同學加油！</div>

    <script>
        // ==================== Config ====================
        const QUESTION_SETS = { /* 保持不變 */ 
            0: {0: [{total:6,people:2},{total:8,people:2},{total:9,people:3},{total:10,people:2},{total:12,people:3}],
                1: [{total:7,people:2},{total:11,people:3},{total:13,people:3},{total:14,people:4},{total:17,people:4}]},
            1: {0: [{total:8,people:2},{total:12,people:3},{total:16,people:4},{total:15,people:3},{total:20,people:4}],
                1: [{total:11,people:3},{total:14,people:3},{total:17,people:4},{total:19,people:4},{total:22,people:3}]},
            2: {0: [{total:24,people:4},{total:28,people:4},{total:30,people:5},{total:36,people:6},{total:25,people:5}],
                1: [{total:26,people:4},{total:29,people:5},{total:31,people:4},{total:35,people:6},{total:37,people:5}]}
        };

        const TIME_PER_QUESTION = 60;
        const FOOD_NAME = {'🍎':'蘋果','🍌':'香蕉','🍓':'草莓','🥟':'燒賣','🍪':'曲奇'};
        const UNITS = {'🍎':'個','🍌':'條','🍓':'顆','🥟':'顆','🍪':'塊'};

        let currentRemainderMode = 0, currentFormulaMode = 0, currentDifficulty = 1;
        let selectedFood = '🍎', selectedFoodName = '蘋果';
        let currentQuestions = [], currentQuestionIndex = 0;
        let totalItems = 0, numPeople = 0;
        let countdownInterval = null, hasSubmitted = false;
        let results = [];           // 儲存每題結果
        let totalTimeUsed = 0;      // 總用時

        // ==================== Grade System ====================
        function getGrade(score) {
            if (score >= 95) return { title: "分物大師", color: "#15803d" };
            if (score >= 80) return { title: "分物之星", color: "#eab308" };
            if (score >= 60) return { title: "分物小能手", color: "#f59e0b" };
            return { title: "繼續努力哦！", color: "#b91c1c" };
        }

        function getGradeCriteria() {
            return `
                <strong>評分標準：</strong><br>
                95–100 分 → 分物大師<br>
                80–94 分 → 分物之星<br>
                60–79 分 → 分物小能手<br>
                0–59 分 → 繼續努力哦！
            `;
        }

        // ==================== Selection Functions ====================
        function selectRemainder(m) { currentRemainderMode = m; updateActive('#remainderChoices', m); }
        function selectFormula(m) { currentFormulaMode = m; updateActive('#formulaChoices', m); }
        function selectDifficulty(m) { currentDifficulty = m; updateActive('#difficultyChoices', m); }

        function updateActive(container, val) {
            document.querySelectorAll(container + ' .choice-btn').forEach(btn => {
                const btnVal = parseInt(btn.dataset.remainder || btn.dataset.formula || btn.dataset.diff);
                btn.classList.toggle('active', btnVal === val);
            });
        }

        function selectFood(el) {
            document.querySelectorAll('.food-option').forEach(e => e.classList.remove('selected'));
            el.classList.add('selected');
            selectedFood = el.getAttribute('data-food');
            selectedFoodName = FOOD_NAME[selectedFood];
            document.getElementById('startGameBtn').disabled = false;
        }

        function startGame() {
            currentQuestions = QUESTION_SETS[currentDifficulty][currentRemainderMode];
            currentQuestionIndex = 0;
            results = [];
            totalTimeUsed = 0;
            document.getElementById('setupPanel').style.display = 'none';
            document.getElementById('gameArea').style.display = 'block';
            if (currentFormulaMode === 1) document.getElementById('divisionArea').style.display = 'block';
            loadCurrentQuestion();
        }

        function loadCurrentQuestion() {
            const q = currentQuestions[currentQuestionIndex];
            totalItems = q.total; 
            numPeople = q.people;

            document.getElementById('questionBox').innerHTML = `有 <strong>${totalItems}</strong> ${UNITS[selectedFood]}${selectedFoodName}，要公平分給 <strong>${numPeople}</strong> 位朋友。`;
            document.getElementById('pileTitle').textContent = `${selectedFood}堆`;
            document.getElementById('currentQ').textContent = currentQuestionIndex + 1;

            resetGameBoard();
            startTimer();
            if (currentFormulaMode === 1) setupDivisionArea();

            hasSubmitted = false;
            document.getElementById('submitBtn').style.display = 'inline-block';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('hintBtn').style.display = 'none';
            document.getElementById('resetBtn').style.display = 'inline-block';
        }

        function resetGameBoard() {
            const pile = document.getElementById('pile');
            pile.innerHTML = '';
            for (let i = 0; i < totalItems; i++) {
                const item = document.createElement('div');
                item.className = 'siumai-item';
                item.textContent = selectedFood;
                item.draggable = true;
                item.ondragstart = (ev) => ev.dataTransfer.setData("text", "food");
                pile.appendChild(item);
            }
            createPlates();
            document.getElementById('feedback').style.display = 'none';
        }

        function createPlates() {
            const container = document.getElementById('platesContainer');
            container.innerHTML = '';
            for (let i = 1; i <= numPeople; i++) {
                container.innerHTML += `
                    <div class="plate">
                        <div class="plate-label">👦 第 ${i} 位</div>
                        <div id="plate-${i}" class="dropzone" ondrop="dropFood(event)" ondragover="allowDrop(event)"></div>
                        <div class="count" id="count-${i}">0</div>
                    </div>`;
            }
        }

        window.allowDrop = ev => { ev.preventDefault(); const zone = ev.target.closest('.dropzone, .pile'); if (zone) zone.classList.add('dragover'); };
        window.dropFood = function(ev) {
            ev.preventDefault();
            const zone = ev.target.closest('.dropzone, .pile');
            if (!zone) return;
            zone.classList.remove('dragover');
            const sourcePile = document.getElementById('pile');
            if (sourcePile.children.length > 0) {
                const item = sourcePile.lastElementChild;
                zone.appendChild(item);
                updateCounts();
            }
        };

        function updateCounts() {
            for (let i = 1; i <= numPeople; i++) {
                const countEl = document.getElementById('count-' + i);
                const plate = document.getElementById('plate-' + i);
                if (countEl && plate) countEl.textContent = plate.children.length;
            }
        }

        function resetDistribution() { resetGameBoard(); }

        function setupDivisionArea() { /* 保持原樣 */ 
            ['totalInput','peopleInput','quotientInput','remainderInput'].forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.value = '';
                    el.addEventListener('input', () => { if (el.value < 0) el.value = 0; });
                    el.addEventListener('keydown', e => { if (e.key === '-' || e.key === 'e') e.preventDefault(); });
                }
            });
            document.getElementById('remainderPart').style.display = currentRemainderMode === 1 ? 'flex' : 'none';
        }

        function startTimer() {
            if (countdownInterval) clearInterval(countdownInterval);
            let timeLeft = TIME_PER_QUESTION;
            document.getElementById('timer').textContent = timeLeft + ' 秒';
            countdownInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft + ' 秒';
                if (timeLeft <= 10) document.getElementById('timer').style.background = '#fecaca';
                if (timeLeft <= 0) submitAnswer(true);
            }, 1000);
        }

        function showAnswer() { /* 保持原樣 */ 
            document.getElementById('totalInput').value = totalItems;
            document.getElementById('peopleInput').value = numPeople;
            document.getElementById('quotientInput').value = Math.floor(totalItems / numPeople);
            if (currentRemainderMode === 1) document.getElementById('remainderInput').value = totalItems % numPeople;
            resetGameBoard();
            const plates = Array.from({length: numPeople}, (_,i) => document.getElementById(`plate-${i+1}`));
            Array.from(document.getElementById('pile').children).forEach((item, i) => {
                plates[i % numPeople].appendChild(item);
            });
            updateCounts();
        }

        function submitAnswer(isTimeout = false) {
            if (hasSubmitted) return;
            hasSubmitted = true;
            if (countdownInterval) clearInterval(countdownInterval);

            const timeUsedThisQ = TIME_PER_QUESTION - parseInt(document.getElementById('timer').textContent) || 0;
            totalTimeUsed += timeUsedThisQ;

            const correctQ = Math.floor(totalItems / numPeople);
            const correctR = totalItems % numPeople;

            let distCorrect = document.getElementById('pile').children.length === correctR;
            for (let i = 1; i <= numPeople; i++) {
                if (document.getElementById('plate-' + i).children.length !== correctQ) distCorrect = false;
            }

            let formulaCorrect = true;
            if (currentFormulaMode === 1) {
                const stuT = parseInt(document.getElementById('totalInput').value) || 0;
                const stuP = parseInt(document.getElementById('peopleInput').value) || 0;
                const stuQ = parseInt(document.getElementById('quotientInput').value) || 0;
                const stuR = currentRemainderMode === 1 ? parseInt(document.getElementById('remainderInput').value) || 0 : 0;
                if (stuT !== totalItems || stuP !== numPeople || stuQ !== correctQ || (currentRemainderMode === 1 && stuR !== correctR)) {
                    formulaCorrect = false;
                }
            }

            const isCorrect = distCorrect && (currentFormulaMode === 0 || formulaCorrect);

            results.push({
                qNum: currentQuestionIndex + 1,
                isCorrect: isCorrect,
                correctQ: correctQ,
                correctR: correctR
            });

            const fb = document.getElementById('feedback');
            const unit = UNITS[selectedFood];

            if (isCorrect) {
                fb.style.background = '#d1fae5'; fb.style.color = '#166534';
                fb.innerHTML = `🎉 太棒了！<br>${totalItems}${unit}${selectedFoodName}分給${numPeople}個人，每個人共分得${correctQ}${unit}`;
                document.getElementById('hintBtn').style.display = 'none';
            } else {
                fb.style.background = '#fee2e2'; fb.style.color = '#b91c1c';
                fb.innerHTML = `正確答案：<br>${totalItems}${unit}${selectedFoodName}分給${numPeople}個人，每個人共分得${correctQ}${unit}`;
                document.getElementById('hintBtn').style.display = 'inline-block';
            }

            fb.style.display = 'block';
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('resetBtn').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'inline-block';
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex >= currentQuestions.length) {
                showFinalResult();
            } else {
                loadCurrentQuestion();
            }
        }

        function showFinalResult() {
            document.getElementById('gameArea').style.display = 'none';
            const resultPanel = document.getElementById('resultPanel');
            resultPanel.style.display = 'block';

            const correctCount = results.filter(r => r.isCorrect).length;
            const score = Math.round((correctCount / results.length) * 100);

            // 顯示分數
            document.getElementById('scoreCircle').textContent = score;
            document.getElementById('scoreCircle').style.borderColor = score >= 80 ? '#15803d' : '#f59e0b';

            // 顯示稱號 + 資訊圖示
            const grade = getGrade(score);
            const gradeEl = document.getElementById('gradeTitle');
            gradeEl.innerHTML = `
                ${grade.title}
                <span class="tooltip">
                    <span style="font-size:1.4rem;cursor:help;">ℹ️</span>
                    <span class="tooltiptext">${getGradeCriteria()}</span>
                </span>
            `;
            gradeEl.style.color = grade.color;

            // 總時間
            document.getElementById('totalTime').textContent = totalTimeUsed;

            // 每題列表
            let listHTML = '';
            results.forEach(r => {
                listHTML += `
                    <div class="result-item">
                        <span>第 ${r.qNum} 題</span>
                        <span class="${r.isCorrect ? 'correct' : 'wrong'}">
                            ${r.isCorrect ? '✅ 正確' : '❌ 錯誤'}
                        </span>
                    </div>`;
            });
            document.getElementById('resultList').innerHTML = listHTML;
        }

        function restartGame() {
            location.reload();
        }

        window.onload = () => {
            document.querySelector('.food-option').classList.add('selected');
            document.getElementById('startGameBtn').disabled = false;
        };
    </script>
</body>
</html>
